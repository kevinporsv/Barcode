<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos de Barras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #E0E7FF 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1F2937;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #6B7280;
            text-align: center;
            margin-bottom: 2rem;
        }

        .config-section {
            background: #F9FAFB;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 8rem;
            border: 2px dashed #93C5FD;
            border-radius: 0.75rem;
            background: #EFF6FF;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .upload-area:hover {
            background: #DBEAFE;
        }

        .upload-icon {
            color: #3B82F6;
            margin-bottom: 0.5rem;
        }

        .upload-text {
            font-size: 0.875rem;
            color: #4B5563;
        }

        .upload-text-bold {
            font-weight: 600;
        }

        .upload-text-small {
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .input-group input {
            flex: 1;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: #3B82F6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563EB;
        }

        .btn-success {
            background: #10B981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-small {
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-actions h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1F2937;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .barcode-card {
            background: white;
            border: 2px solid #E5E7EB;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: box-shadow 0.2s;
        }

        .barcode-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .barcode-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .barcode-code {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            word-break: break-all;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            color: #EF4444;
            transition: color 0.2s;
        }

        .btn-icon:hover {
            color: #DC2626;
        }

        .barcode-container {
            background: white;
            padding: 0.5rem;
            border: 1px solid #E5E7EB;
            border-radius: 0.25rem;
            margin-bottom: 0.75rem;
        }

        .barcode-container canvas {
            width: 100%;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: #6B7280;
        }

        .empty-state-title {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .empty-state-text {
            font-size: 0.875rem;
        }

        input[type="file"] {
            display: none;
        }

        #results-section {
            display: none;
        }

        #results-section.show {
            display: block;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #D1D5DB;
            background: white;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .pagination button:hover:not(:disabled) {
            background: #F3F4F6;
            border-color: #3B82F6;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }

        .pagination-info {
            font-size: 0.875rem;
            color: #6B7280;
            margin: 0 0.5rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.875rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons {
                flex-direction: column;
            }

            .pagination button {
                padding: 0.4rem 0.6rem;
                font-size: 0.75rem;
            }

            .pagination-info {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Generador de Códigos de Barras</h1>
            <p class="subtitle">Sube un archivo Excel o ingresa códigos manualmente</p>

            <div class="config-section">
                <label for="barcodeType">Tipo de Código de Barras</label>
                <select id="barcodeType">
                    <option value="CODE128">CODE128 - Universal (acepta cualquier texto/números)</option>
                    <option value="EAN13">EAN13 - Productos (solo códigos de 13 dígitos)</option>
                    <option value="UPC">UPC - Productos USA (solo códigos de 12 dígitos)</option>
                    <option value="CODE39">CODE39 - Industrial (letras, números y símbolos)</option>
                    <option value="ITF14">ITF14 - Cajas (solo códigos de 14 dígitos)</option>
                </select>
                <p id="formatInfo" style="margin-top: 0.5rem; font-size: 0.75rem; color: #6B7280;">
                    💡 CODE128 acepta cualquier texto o números
                </p>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="upload-area" for="fileInput">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <p class="upload-text">
                        <span class="upload-text-bold">Click para subir</span> o arrastra un archivo
                    </p>
                    <p class="upload-text-small">XLSX, XLS o TXT (un código por línea)</p>
                </label>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.txt" style="display: none;">
            </div>

            <div class="config-section">
                <label for="manualCode">O ingresa un código manualmente</label>
                <div class="input-group">
                    <input type="text" id="manualCode" placeholder="Ingresa un código...">
                    <button id="addBtn" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Agregar
                    </button>
                </div>
            </div>

            <div id="results-section">
                <div class="header-actions">
                    <h2>Códigos de Barras Generados (<span id="codeCount">0</span>)</h2>
                    <div class="action-buttons">
                        <button id="downloadAllBtn" class="btn btn-success btn-small">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            Descargar ZIP
                        </button>
                        <button id="clearAllBtn" class="btn btn-danger btn-small">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            Limpiar Todo
                        </button>
                    </div>
                </div>
                <div id="barcodeGrid" class="grid"></div>
                
                <div id="paginationControls" class="pagination">
                    <button id="firstPageBtn">Primera</button>
                    <button id="prevPageBtn">Anterior</button>
                    <span class="pagination-info">
                        Página <span id="currentPageNum">1</span> de <span id="totalPages">1</span>
                    </span>
                    <button id="nextPageBtn">Siguiente</button>
                    <button id="lastPageBtn">Última</button>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <p class="empty-state-title">No hay códigos de barras generados aún</p>
                <p class="empty-state-text">Sube un archivo Excel (.xlsx, .xls), Texto (.txt) o ingresa códigos manualmente</p>
            </div>
        </div>
    </div>

    <script>
        let codes = [];
        let barcodeType = 'CODE128';
        let currentPage = 1;
        const codesPerPage = 12; // Códigos por página

        const fileInput = document.getElementById('fileInput');
        const manualCodeInput = document.getElementById('manualCode');
        const addBtn = document.getElementById('addBtn');
        const barcodeTypeSelect = document.getElementById('barcodeType');
        const resultsSection = document.getElementById('results-section');
        const emptyState = document.getElementById('emptyState');
        const barcodeGrid = document.getElementById('barcodeGrid');
        const codeCount = document.getElementById('codeCount');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        
        // Elementos de paginación
        const firstPageBtn = document.getElementById('firstPageBtn');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const lastPageBtn = document.getElementById('lastPageBtn');
        const currentPageNum = document.getElementById('currentPageNum');
        const totalPagesEl = document.getElementById('totalPages');
        const paginationControls = document.getElementById('paginationControls');

        // Cambiar tipo de código de barras
        barcodeTypeSelect.addEventListener('change', (e) => {
            const oldType = barcodeType;
            barcodeType = e.target.value;
            updateFormatInfo();
            
            // Verificar cuántos códigos actuales son válidos para el nuevo formato
            if (codes.length > 0) {
                const validCodes = codes.filter(code => isValidForFormat(code.value, barcodeType));
                const invalidCount = codes.length - validCodes.length;
                
                if (invalidCount > 0) {
                    const mensaje = `⚠️ Cambio de formato: ${oldType} → ${barcodeType}\n\n` +
                                  `${invalidCount} de ${codes.length} códigos no son válidos para ${barcodeType}.\n\n` +
                                  `Estos códigos NO se mostrarán ni se incluirán en las descargas.\n\n` +
                                  `¿Deseas continuar?`;
                    
                    if (!confirm(mensaje)) {
                        // Revertir el cambio
                        barcodeType = oldType;
                        barcodeTypeSelect.value = oldType;
                        updateFormatInfo();
                        return;
                    }
                    
                    // Filtrar solo los códigos válidos
                    codes = validCodes;
                    currentPage = 1;
                }
            }
            
            renderBarcodes();
        });

        // Actualizar información del formato
        function updateFormatInfo() {
            const formatInfo = document.getElementById('formatInfo');
            const messages = {
                'CODE128': '💡 CODE128 acepta cualquier texto o números',
                'EAN13': '⚠️ Solo acepta códigos con exactamente 13 dígitos (ej: 1234567890123)',
                'UPC': '⚠️ Solo acepta códigos con exactamente 12 dígitos (ej: 123456789012)',
                'CODE39': '💡 Acepta letras, números y símbolos: -. $/+%',
                'ITF14': '⚠️ Solo acepta códigos con exactamente 14 dígitos (ej: 12345678901234)'
            };
            formatInfo.textContent = messages[barcodeType] || '';
        }

        // Subir archivo Excel o TXT
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Mostrar mensaje de carga
            emptyState.innerHTML = '<p class="empty-state-title" style="color: #3B82F6;">⏳ Cargando archivo... Por favor espera</p>';
            emptyState.style.display = 'block';

            try {
                console.log('Leyendo archivo:', file.name);
                const fileName = file.name.toLowerCase();
                const newCodes = [];
                const invalidCodes = [];

                // Detectar tipo de archivo
                if (fileName.endsWith('.txt')) {
                    // Procesar archivo TXT
                    console.log('Procesando archivo de texto...');
                    const text = await file.text();
                    const lines = text.split(/\r?\n/);
                    
                    console.log('Líneas encontradas:', lines.length);
                    
                    lines.forEach(line => {
                        const trimmedLine = line.trim();
                        if (trimmedLine !== '') {
                            const cleanValue = trimmedLine.replace(/\s/g, '');
                            
                            if (isValidForFormat(cleanValue, barcodeType)) {
                                newCodes.push({
                                    id: Date.now() + Math.random(),
                                    value: cleanValue,
                                    original: trimmedLine
                                });
                            } else {
                                invalidCodes.push(trimmedLine);
                            }
                        }
                    });
                    
                } else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                    // Procesar archivo Excel
                    console.log('Procesando archivo Excel...');
                    const data = await file.arrayBuffer();
                    
                    const workbook = XLSX.read(data);
                    console.log('Hojas disponibles:', workbook.SheetNames);
                    
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    console.log('Filas encontradas:', jsonData.length);
                    
                    jsonData.flat().forEach(code => {
                        if (code !== null && code !== undefined && code !== '') {
                            const original = String(code).trim();
                            const cleanValue = original.replace(/\s/g, '');
                            
                            if (isValidForFormat(cleanValue, barcodeType)) {
                                newCodes.push({
                                    id: Date.now() + Math.random(),
                                    value: cleanValue,
                                    original: original
                                });
                            } else {
                                invalidCodes.push(original);
                            }
                        }
                    });
                } else {
                    throw new Error('Formato de archivo no soportado. Use .xlsx, .xls o .txt');
                }

                console.log('Códigos válidos:', newCodes.length);
                console.log('Códigos inválidos:', invalidCodes.length);

                if (newCodes.length === 0 && invalidCodes.length === 0) {
                    emptyState.innerHTML = `
                        <p class="empty-state-title" style="color: #EF4444;">❌ No se encontraron códigos</p>
                        <p class="empty-state-text">Asegúrate de que el archivo contenga datos</p>
                    `;
                    alert('No se encontraron códigos en el archivo.');
                } else if (newCodes.length === 0 && invalidCodes.length > 0) {
                    emptyState.innerHTML = `
                        <p class="empty-state-title" style="color: #EF4444;">❌ Ningún código es válido</p>
                        <p class="empty-state-text">Todos los códigos en el archivo son inválidos para ${barcodeType}</p>
                    `;
                    alert(`❌ Ningún código es válido para ${barcodeType}\n\nSe encontraron ${invalidCodes.length} códigos pero ninguno cumple con los requisitos.\n\n${barcodeType} ${getValidationMessage(barcodeType)}.`);
                } else {
                    codes.push(...newCodes);
                    currentPage = 1;
                    
                    let mensaje = `✅ Se cargaron ${newCodes.length} códigos exitosamente!`;
                    if (invalidCodes.length > 0) {
                        mensaje += `\n\n⚠️ Se omitieron ${invalidCodes.length} códigos inválidos para ${barcodeType}.`;
                        console.warn('Códigos omitidos:', invalidCodes);
                    }
                    alert(mensaje);
                    renderBarcodes();
                }
            } catch (error) {
                console.error('Error completo:', error);
                emptyState.innerHTML = `
                    <p class="empty-state-title" style="color: #EF4444;">❌ Error al cargar el archivo</p>
                    <p class="empty-state-text">${error.message}</p>
                `;
                alert('Error al leer el archivo: ' + error.message + '\n\nAsegúrate de que sea un archivo válido (.xlsx, .xls o .txt).');
            }
            
            e.target.value = '';
        });

        // Validar si un código es válido para el formato sin modificarlo
        function isValidForFormat(value, format) {
            const cleanValue = value.replace(/\s/g, '');
            
            switch(format) {
                case 'EAN13':
                    // Debe tener exactamente 13 dígitos
                    return /^\d{13}$/.test(cleanValue);
                    
                case 'UPC':
                    // Debe tener 12 dígitos (UPC-A)
                    return /^\d{12}$/.test(cleanValue);
                    
                case 'ITF14':
                    // Debe tener exactamente 14 dígitos
                    return /^\d{14}$/.test(cleanValue);
                    
                case 'CODE39':
                    // Acepta A-Z, 0-9 y algunos símbolos: -. $/+%
                    return /^[A-Z0-9\-. $/+%]+$/i.test(cleanValue);
                    
                case 'CODE128':
                default:
                    // CODE128 acepta cualquier carácter ASCII
                    return cleanValue.length > 0;
            }
        }

        // Obtener mensaje de error específico
        function getValidationMessage(format) {
            const messages = {
                'EAN13': 'requiere exactamente 13 dígitos',
                'UPC': 'requiere exactamente 12 dígitos',
                'ITF14': 'requiere exactamente 14 dígitos',
                'CODE39': 'solo acepta letras, números y estos símbolos: -. $/+%',
                'CODE128': 'acepta cualquier texto'
            };
            return messages[format] || '';
        }

        // Agregar código manual
        function addManualCode() {
            const value = manualCodeInput.value.trim();
            if (value) {
                const cleanValue = value.replace(/\s/g, '');
                
                if (!isValidForFormat(cleanValue, barcodeType)) {
                    alert(`❌ Código inválido para ${barcodeType}\n\nEl código "${value}" ${getValidationMessage(barcodeType)}.`);
                    return;
                }
                
                codes.push({
                    id: Date.now(),
                    value: cleanValue,
                    original: value
                });
                manualCodeInput.value = '';
                
                // Ir a la última página donde está el nuevo código
                currentPage = Math.ceil(codes.length / codesPerPage);
                renderBarcodes();
            }
        }

        addBtn.addEventListener('click', addManualCode);
        manualCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addManualCode();
        });

        // Eliminar código
        function deleteCode(id) {
            codes = codes.filter(code => code.id !== id);
            
            // Ajustar página si es necesario
            const totalPages = Math.ceil(codes.length / codesPerPage);
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
            }
            
            renderBarcodes();
        }

        // Limpiar todos
        clearAllBtn.addEventListener('click', () => {
            if (confirm('¿Estás seguro de que deseas eliminar todos los códigos?')) {
                codes = [];
                currentPage = 1;
                renderBarcodes();
            }
        });

        // Controles de paginación
        firstPageBtn.addEventListener('click', () => {
            currentPage = 1;
            renderBarcodes();
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderBarcodes();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(codes.length / codesPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderBarcodes();
            }
        });

        lastPageBtn.addEventListener('click', () => {
            currentPage = Math.ceil(codes.length / codesPerPage);
            renderBarcodes();
        });

        // Descargar código individual
        function downloadBarcode(canvas, codeValue) {
            const url = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `barcode_${codeValue}.png`;
            link.href = url;
            link.click();
        }

        // Descargar todos en ZIP
        downloadAllBtn.addEventListener('click', async () => {
            if (codes.length === 0) return;
            
            const confirmed = confirm(`¿Descargar todos los ${codes.length} códigos de barras en un archivo ZIP?`);
            if (!confirmed) return;
            
            // Cambiar texto del botón
            const originalText = downloadAllBtn.innerHTML;
            downloadAllBtn.innerHTML = '<span style="display: flex; align-items: center; gap: 0.5rem;">⏳ Generando ZIP...</span>';
            downloadAllBtn.disabled = true;
            
            try {
                // Crear instancia de JSZip
                const zip = new JSZip();
                const tempCanvas = document.createElement('canvas');
                
                // Generar todos los códigos de barras y agregarlos al ZIP
                for (let i = 0; i < codes.length; i++) {
                    const code = codes[i];
                    
                    try {
                        // Generar código de barras
                        JsBarcode(tempCanvas, code.value, {
                            format: barcodeType,
                            width: 2,
                            height: 100,
                            displayValue: true,
                            fontSize: 14,
                            margin: 10
                        });
                        
                        // Convertir canvas a blob
                        const dataUrl = tempCanvas.toDataURL('image/png');
                        const base64Data = dataUrl.split(',')[1];
                        
                        // Agregar al ZIP con nombre único
                        const fileName = `barcode_${code.value}.png`;
                        zip.file(fileName, base64Data, { base64: true });
                        
                        // Actualizar progreso
                        if (i % 10 === 0 || i === codes.length - 1) {
                            downloadAllBtn.innerHTML = `<span style="display: flex; align-items: center; gap: 0.5rem;">⏳ Generando... ${i + 1}/${codes.length}</span>`;
                        }
                    } catch (error) {
                        console.error(`Error generando código ${code.value}:`, error);
                    }
                }
                
                // Generar y descargar el ZIP
                downloadAllBtn.innerHTML = '<span style="display: flex; align-items: center; gap: 0.5rem;">📦 Creando archivo ZIP...</span>';
                
                const zipBlob = await zip.generateAsync({ 
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                // Crear nombre del archivo con fecha
                const fecha = new Date().toISOString().slice(0, 10);
                const nombreZip = `codigos_barras_${fecha}.zip`;
                
                // Descargar el ZIP
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = nombreZip;
                link.click();
                
                // Limpiar
                URL.revokeObjectURL(link.href);
                
                alert(`✅ Se descargaron ${codes.length} códigos de barras en ${nombreZip}`);
                
            } catch (error) {
                console.error('Error al crear ZIP:', error);
                alert('Error al crear el archivo ZIP: ' + error.message);
            } finally {
                // Restaurar botón
                downloadAllBtn.innerHTML = originalText;
                downloadAllBtn.disabled = false;
            }
        });

        // Renderizar códigos de barras
        function renderBarcodes() {
            if (codes.length === 0) {
                resultsSection.classList.remove('show');
                emptyState.style.display = 'block';
                return;
            }

            resultsSection.classList.add('show');
            emptyState.style.display = 'none';
            codeCount.textContent = codes.length;

            // Calcular paginación
            const totalPages = Math.ceil(codes.length / codesPerPage);
            const startIndex = (currentPage - 1) * codesPerPage;
            const endIndex = startIndex + codesPerPage;
            const currentCodes = codes.slice(startIndex, endIndex);

            // Actualizar información de paginación
            currentPageNum.textContent = currentPage;
            totalPagesEl.textContent = totalPages;

            // Habilitar/deshabilitar botones
            firstPageBtn.disabled = currentPage === 1;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
            lastPageBtn.disabled = currentPage === totalPages;

            // Mostrar/ocultar controles de paginación
            if (codes.length <= codesPerPage) {
                paginationControls.style.display = 'none';
            } else {
                paginationControls.style.display = 'flex';
            }

            barcodeGrid.innerHTML = '';

            currentCodes.forEach((code, index) => {
                const globalIndex = startIndex + index;
                
                const card = document.createElement('div');
                card.className = 'barcode-card';
                
                let displayInfo = `<span class="barcode-code">${code.value}</span>`;
                if (code.original && code.original !== code.value) {
                    displayInfo = `
                        <div>
                            <span class="barcode-code">${code.value}</span>
                            <div style="font-size: 0.75rem; color: #6B7280; margin-top: 0.25rem;">Original: ${code.original}</div>
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="barcode-header">
                        ${displayInfo}
                        <button class="btn-icon" onclick="deleteCode(${code.id})">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="barcode-container">
                        <canvas id="canvas-${code.id}"></canvas>
                    </div>
                    <button class="btn btn-primary btn-small" style="width: 100%" onclick="downloadBarcode(document.getElementById('canvas-${code.id}'), '${code.value}')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Descargar
                    </button>
                `;
                barcodeGrid.appendChild(card);

                // Generar código de barras
                setTimeout(() => {
                    const canvas = document.getElementById(`canvas-${code.id}`);
                    if (canvas) {
                        try {
                            JsBarcode(canvas, code.value, {
                                format: barcodeType,
                                width: 2,
                                height: 100,
                                displayValue: true,
                                fontSize: 14,
                                margin: 10
                            });
                        } catch (error) {
                            console.error(`Error generando código de barras para ${code.value}:`, error);
                            canvas.parentElement.innerHTML = `<p style="color: #EF4444; text-align: center; padding: 20px; font-size: 0.875rem;">Error al generar código</p>`;
                        }
                    }
                }, 10);
            });

            // Scroll al inicio de la página de resultados
            if (currentPage > 1) {
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Hacer funciones globales
        window.deleteCode = deleteCode;
        window.downloadBarcode = downloadBarcode;

        // Inicializar
        updateFormatInfo();
    </script>
</body>
</html>
